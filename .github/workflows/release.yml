name: release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run (build the image without pushing; skip the GitHub Release)'
        required: false
        default: 'false'

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  # packages: write lets GITHUB_TOKEN push the image to this repo's GHCR namespace.
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/label-309-gateway

jobs:
  release:
    runs-on: ubuntu-latest
    # A QEMU-emulated arm64 Rust release build is slow; give the multi-arch build
    # room while still capping the job.
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6

      # Derive the image tags from the ref. A final release moves `latest`; a
      # pre-release (vX.Y.Z-rc.1) is published under its exact tag only. A manual
      # dry-run tags a throwaway version and never pushes.
      - name: Derive image tags
        id: meta
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="0.0.0-dryrun"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if [[ "$version" == *-* ]]; then
            is_prerelease=true
          else
            is_prerelease=false
          fi
          echo "is_prerelease=$is_prerelease" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "${IMAGE}:${version}"
            if [ "$is_prerelease" = "false" ]; then echo "${IMAGE}:latest"; fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v4.2.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true') }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---- GitHub Release (tag push only) --------------------------------------
      - name: Extract release notes from CHANGELOG
        if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          # Print the body of the "## [version]" section up to the next "## ".
          awk -v ver="$version" '
            $0 ~ ("^## \\[?" ver "\\]?") { grab=1; next }
            grab && /^## / { exit }
            grab { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            printf 'Release %s. See CHANGELOG.md for details.\n' "$version" > release-notes.md
          fi

      - name: Create GitHub Release
        if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: 'Label 309 Gateway ${{ github.ref_name }}'
          body_path: release-notes.md
          draft: false
          prerelease: ${{ steps.meta.outputs.is_prerelease }}
