name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # Debug info bloats the test targets past the stock runner disk on a full
  # all-features build; panic messages and test names survive without it.
  CARGO_PROFILE_DEV_DEBUG: "0"
  CARGO_INCREMENTAL: "0"

jobs:
  test:
    name: Build, test, lint
    runs-on: ubuntu-latest
    timeout-minutes: 45

    # The engine's integration tests (feature pg-tests) need a reachable
    # Postgres; the harness creates its own test database, so only the
    # credentials have to match.
    services:
      postgres:
        image: postgres:18-bookworm
        env:
          POSTGRES_USER: cardanowall
          POSTGRES_PASSWORD: cardanowall_dev
          POSTGRES_DB: cardanowall_dev
          POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C.UTF-8"
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cardanowall -d cardanowall_dev"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 30
          --health-start-period 5s

    steps:
      - uses: actions/checkout@v6

      # A full all-features build does not fit the stock runner disk alongside
      # the preinstalled toolchains this job never uses; dropping them reclaims
      # ~30 GB in seconds.
      - name: Reclaim runner disk
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/.ghcup /opt/hostedtoolcache/CodeQL
          df -h /

      - name: Install stable toolchain
        run: rustup toolchain install stable --profile minimal --component clippy,rustfmt

      - name: Cache cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      # crates.io carries a later-published 0.36.x line of the pallas crates
      # alongside the stable 1.0 line, so a loosened requirement could silently
      # resolve the older API. Assert every pinned pallas crate resolved to 1.x
      # before anything compiles against it.
      - name: pallas crates resolve to the 1.x line
        run: |
          set -euo pipefail
          fail=0
          for crate in pallas-txbuilder pallas-primitives pallas-codec pallas-crypto pallas-addresses; do
            resolved=$(cargo tree --quiet --package "$crate" --depth 0 | head -1 | awk '{print $2}')
            echo "$crate => $resolved"
            case "$resolved" in
              v1.*) ;;
              *) echo "ERROR: $crate resolved to $resolved (expected v1.x)"; fail=1 ;;
            esac
          done
          exit "$fail"

      - name: Format check
        run: cargo fmt --check

      - name: Clippy (warnings as errors)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --workspace --all-features

      - name: Test (workspace, all features, Postgres-backed; conformance excluded)
        env:
          GATEWAY_TEST_DATABASE_URL: postgres://cardanowall:cardanowall_dev@localhost:5432/cardanowall_gateway_test
        run: cargo test --workspace --exclude conformance --all-features

      - name: Docs (deny broken intra-doc links)
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --no-deps --workspace --all-features
